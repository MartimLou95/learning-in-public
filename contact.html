<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact — Martim</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- ===== TOP NAV BAR ===== -->
    <header class="site-header">
      <a href="index.html" class="brand">Martim</a>
      <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="learning.html">Learning</a>
        <a href="contact.html">Contact</a>
      </nav>
    </header>

    <!-- ===== TWO-COLUMN SHELL ===== -->
    <div class="layout">
      <!-- LEFT: other ways to reach me -->
      <aside class="sidebar">
        <p class="sidebar-label">Elsewhere</p>
        <nav class="sidebar-nav">
          <a href="mailto:martimcolour@gmail.com">Email</a>
          <a
            href="https://github.com/MartimLou95"
            rel="noopener"
            target="_blank"
            >GitHub</a
          >
        </nav>
      </aside>

      <!-- RIGHT: the contact form -->
      <main class="content">
        <h1>Get in touch</h1>
        <p>Drop me a message and I'll get back to you.</p>

        <form action="#" method="post" class="contact-form">
          <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required />
          </div>

          <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>

          <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" rows="6" required></textarea>
          </div>

          <button type="submit" class="btn">Send message</button>
        </form>
      </main>
    </div>
  </body>
</html>
